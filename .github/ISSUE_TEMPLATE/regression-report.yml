
name: ☣️ Regression
description: Report a regression you've observed in a newer version
title: "[Regression] <title>"
labels: ["type:regression", "triage:product"]
body:
-   type: markdown
    attributes:
        value: |
            ## Issues, bug-bashing, help us help you

            > ⚠️ Here's how you can get your issue triaged and fixed ASAP

            In the age of AI, we should be innovating and shipping **high-quality** software daily.

            So in this adapter, we try to fix bugs and ship features fast - and keep an extremely high bar for test coverage in CI before PRs merge to `main`.

            Once you open an issue, please - try to be **as descriptive as possible** to give our human/AI maintainers the necessary details to reproduce the issue rapidly.

            For example - if you can - create a dummy repro dbt project in your GitHub account - so the maintainers can reproduce your problem ASAP - see an example a well-written GitHub issue [here](https://github.com/microsoft/dbt-fabricspark/issues/172#issuecomment-4426907640).

            If the issue is complex - once we have a fix identified, to gain more confidence, we might ask you install the adapter right from a PR branch to ensure the repro is gone in your setup as well, like so:

            ```bash
            pip install git+https://github.com/microsoft/dbt-fabricspark.git@dev/somebranch/123
            ```
-   type: markdown
    attributes:
        value: Thanks for taking the time to fill out this regression report!
-   type: checkboxes
    attributes:
        label: Is this a regression?
        description: >
          A regression is when documented functionality works as expected in an older version of the software
          and no longer works after upgrading to a newer version the software
        options:
        -   label: I believe this is a regression in functionality
            required: true
        -   label: I have searched the existing issues, and I could not find an existing issue for this regression
            required: true
-   type: textarea
    attributes:
        label: Current Behavior
        description: A concise description of what you're experiencing.
    validations:
        required: true
-   type: textarea
    attributes:
        label: Expected/Previous Behavior
        description: A concise description of what you expected to happen.
    validations:
        required: true
-   type: textarea
    attributes:
        label: Steps To Reproduce
        description: Steps to reproduce the behavior.
        placeholder: |
          1. In this environment...
          2. With this config...
          3. Run '...'
          4. See error...
    validations:
        required: true
-   type: textarea
    id: logs
    attributes:
        label: Relevant log output
        description: If applicable, log output to help explain your problem.
        render: shell
    validations:
        required: false
-   type: textarea
    attributes:
        label: Environment
        description: |
            examples:
            - **OS**: Ubuntu 20.04
            - **Python**: 3.11.6 (`python3 --version`)
            - **dbt-adapters (working version)**: 1.1.0
            - **dbt-adapters (regression version)**: 1.2.0
            - **dbt-core (working version)**: 1.8.1 (`dbt --version`)
            - **dbt-fabricspark (regression version)**: 1.9.0 (`dbt --version`)
        value: |
            - OS:
            - Python:
            - dbt-adapters (working version):
            - dbt-adapters (regression version):
            - dbt-core (working version):
            - dbt-core (regression version):
            - dbt-fabricspark (working version):
            - dbt-fabricspark (regression version):
        render: markdown
    validations:
        required: true
-   type: textarea
    attributes:
        label: Additional Context
        description: |
          Links? References? Anything that will give us more context about the issue you are encountering!

          Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
        required: false