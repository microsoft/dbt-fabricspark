# **what?**
# Release workflow provides the following steps:
# - checkout the tagged commit;
# - run clean / lint / build / test via nx inside the devcontainer image;
# - publish to PyPI via the nx publish target (no-op if UV_PUBLISH_TOKEN is unset).
#
# **why?**
# Ensure an automated and tested release process that mirrors the dev container.
#
# **when?**
# When a GitHub Release is created with a v* tag.

name: Release new version to PyPI

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  release-version:
    name: Release new version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 120
    container:
      image: dbtfabric.azurecr.io/devcontainer/spark:b296e609fa851da70c93b4f7b29e56c64a742cb26c193935e17afddcca151fca
      options: >-
        --cap-add=SYS_ADMIN
        --device=/dev/fuse
        --security-opt=apparmor:unconfined
        --add-host=host.docker.internal:host-gateway

    defaults:
      run:
        shell: bash

    env:
      UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: "🔒 Configure container permissions and PATH"
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: "⚙️ Post create commands"
        run: /tmp/overlay/post-create-commands.sh

      - name: "⚙️ Post attach commands"
        run: /tmp/overlay/post-attach-commands.sh

      - name: "🧹 Clean"
        run: npx nx run dbt-fabricspark:clean --output-style=stream --verbose

      - name: "🧹 Lint"
        run: npx nx run dbt-fabricspark:lint --output-style=stream --verbose

      - name: "📦 Build"
        run: npx nx run dbt-fabricspark:build --output-style=stream --verbose

      - name: "🧪 Test"
        run: npx nx run dbt-fabricspark:test --output-style=stream --verbose

      - name: "🚀 Publish"
        run: npx nx run dbt-fabricspark:publish --output-style=stream --verbose
