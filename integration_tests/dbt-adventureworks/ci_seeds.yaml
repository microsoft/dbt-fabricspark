# Manifest for downloading dbt-adventureworks seed CSV files from GitHub Gist.
# Used by integration_tests/scripts/download_seeds.py
#
# Raw URL pattern:
#   https://gist.githubusercontent.com/{gist_owner}/{gist_id}/raw/{filename}

gist_id: "d7023f366fda94488a000865ee0e418e"
gist_owner: "mdrakiburrahman"

files:
  # seeds/date
  - path: seeds/date/date.csv
    filename: date.csv
  # seeds/person
  - path: seeds/person/address.csv
    filename: address.csv
  - path: seeds/person/countryregion.csv
    filename: countryregion.csv
  - path: seeds/person/person.csv
    filename: person.csv
  - path: seeds/person/stateprovince.csv
    filename: stateprovince.csv
  # seeds/production
  - path: seeds/production/product.csv
    filename: product.csv
  - path: seeds/production/productcategory.csv
    filename: productcategory.csv
  - path: seeds/production/productsubcategory.csv
    filename: productsubcategory.csv
  # seeds/sales
  - path: seeds/sales/creditcard.csv
    filename: creditcard.csv
  - path: seeds/sales/customer.csv
    filename: customer.csv
  - path: seeds/sales/salesorderdetail.csv
    filename: salesorderdetail.csv
  - path: seeds/sales/salesorderheader.csv
    filename: salesorderheader.csv
  - path: seeds/sales/salesorderheadersalesreason.csv
    filename: salesorderheadersalesreason.csv
  - path: seeds/sales/salesreason.csv
    filename: salesreason.csv
  - path: seeds/sales/store.csv
    filename: store.csv
