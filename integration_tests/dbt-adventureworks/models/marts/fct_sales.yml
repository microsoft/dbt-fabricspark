version: 2

models:
  - name: fct_sales
    columns:
      - name: sales_key
        description: The surrogate key of the fct sales
        tests:
          - unique

      - name: product_key
        description: The foreign key of the product
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_key
              config:
                severity: warn

      - name: order_date_key
        description: The foreign key of the order date
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
              config:
                severity: warn

      - name: unitprice
        description: The unit price of the product
        tests:
          - not_null
