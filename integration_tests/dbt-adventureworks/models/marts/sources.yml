version: 2

sources:
  - name: adventureworks_seed
    description: "Seed data for the AdventureWorks project (loaded via dbt seed)"
    schema: default
    tables:
      # Date
      - name: date
        description: "Date dimension seed data"

      # Production
      - name: product
        description: "Product seed data"
      - name: productcategory
        description: "Product category seed data"
      - name: productsubcategory
        description: "Product subcategory seed data"

      # Sales
      - name: salesorderdetail
        description: "Sales order detail seed data"
        columns:
          - name: productid
            tests:
              - relationships:
                  to: source('adventureworks_seed', 'product')
                  field: productid
                  config:
                    severity: warn
      - name: salesorderheader
        description: "Sales order header seed data"
