fixed:
  type: fabricspark
prompts:
  _choose_authentication_method:
    livy:
      _fixed_method: livy
      workspaceid:
        hint: GUID of the workspace. Open the workspace from fabric.microsoft.com and copy the workspace url
      lakehouse:
        hint: Name of the Lakehouse in the workspace that you want to connect to
      lakehouseid:
        hint: GUID of the lakehouse, which can be extracted from url when you open lakehouse artifact from fabric.microsoft.com
      endpoint:
        default: https://api.fabric.microsoft.com/v1
      auth:
        default: CLI
        hint: One of CLI (az login), SPN (client_id/secret/tenant), fabric_notebook, or token_credential (custom TokenCredential)
      client_id:
        hint: Use when SPN auth is used.
      client_secret:
        hint: Use when SPN auth is used.
      tenant_id:
        hint: Use when SPN auth is used.
      credential_class:
        hint: Use when token_credential auth is used. Dotted path to a class implementing azure.core.credentials.TokenCredential (e.g. my_pkg.auth.ExternalTokenCredential).
      credential_kwargs:
        hint: Use when token_credential auth is used. Mapping of kwargs passed to credential_class on instantiation.
      connect_retries:
        default: 0
        type: 'int'
      connect_timeout:
        default: 10
        type: 'int'
      session_id_file:
        hint: Optional path to file storing Livy session ID for session reuse. Defaults to ./livy-session-id.txt if not specified.
  schema:
    hint: 'default schema that dbt will build objects in'
  threads:
    hint: '1 or more'
    type: 'int'
    default: 1
