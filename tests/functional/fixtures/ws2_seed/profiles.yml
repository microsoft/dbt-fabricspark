ws2_seed_fixture:
  target: ws2
  outputs:
    ws2:
      type: fabricspark
      method: livy
      authentication: "{{ env_var('FABRIC_AUTH_METHOD', 'CLI') }}"
      endpoint: "{{ env_var('LIVY_ENDPOINT', 'https://api.fabric.microsoft.com/v1') }}"
      workspaceid: "{{ env_var('WORKSPACE_ID_2') }}"
      lakehouseid: "{{ env_var('WS2_LAKEHOUSE_ID') }}"
      lakehouse: "{{ env_var('WS2_LAKEHOUSE_NAME') }}"
      schema: dbo
      threads: 1
      reuse_session: false
      retry_all: true
      connect_retries: 3
      connect_timeout: 15
      spark_config:
        name: "dbt-ws2-cross-workspace-seed"
