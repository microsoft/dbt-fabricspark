mode: waitall

groups:
  - Group: Pre-Test-Cleanup
    Strategy: sequential
    Mode: failfast

  - Group: Provision-Infra
    Strategy: sequential
    Mode: failfast

  - Group: Warmup-Sessions
    Strategy: parallel
    Mode: failfast

  - Group: Integration-Tests
    Strategy: parallel
    Mode: failfast

  - Group: Post-Test-Cleanup
    Strategy: sequential
    Mode: runalways

tasks:
  - Command: uv run python -m tests.functional.orchestrator nuke
    Name: Pre-test workspace nuke (WS1 + WS2)
    Group: Pre-Test-Cleanup
    TimeoutInMinutes: 5

  - Command: uv run python -m tests.functional.orchestrator provision --schema-mode no_schema
    Name: Provision no_schema lakehouse (WS1)
    Group: Provision-Infra
    TimeoutInMinutes: 5

  - Command: uv run python -m tests.functional.orchestrator provision --schema-mode with_schema
    Name: Provision with_schema lakehouse (WS1)
    Group: Provision-Infra
    TimeoutInMinutes: 5

  - Command: uv run python -m tests.functional.orchestrator provision --schema-mode with_schema --workspace ws2
    Name: Provision with_schema lakehouse (WS2 cross-workspace read source)
    Group: Provision-Infra
    TimeoutInMinutes: 5

  - Command: uv run python -m tests.functional.orchestrator seed-ws2
    Name: Seed cross_ws_fixture into WS2 lakehouse
    Group: Provision-Infra
    TimeoutInMinutes: 25

  - Command: uv run python -m tests.functional.orchestrator create-session --schema-mode no_schema --count 4
    Name: Create Livy session (no_schema)
    Group: Warmup-Sessions
    TimeoutInMinutes: 70

  - Command: uv run python -m tests.functional.orchestrator create-session --schema-mode with_schema --count 4
    Name: Create Livy session (with_schema)
    Group: Warmup-Sessions
    TimeoutInMinutes: 70

  - Command: uv run python -m tests.functional.orchestrator run-tests --schema-mode no_schema
    Name: Functional tests (no_schema)
    Group: Integration-Tests
    TimeoutInMinutes: 180

  - Command: uv run python -m tests.functional.orchestrator run-tests --schema-mode with_schema
    Name: Functional tests (with_schema, includes cross-workspace)
    Group: Integration-Tests
    TimeoutInMinutes: 180

  - Command: uv run python -m tests.functional.orchestrator nuke
    Name: Post-test workspace nuke (WS1 + WS2)
    Group: Post-Test-Cleanup
    TimeoutInMinutes: 5
